{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">새 KPI 등록</h2>
    
    <form method="post" action="{% url 'add_kpi' %}">
        {% csrf_token %}
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">지표명</label>
                <input type="text" name="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">설명 (AI가 이를 바탕으로 카테고리를 자동 추천합니다)</label>
                <textarea name="description" rows="4" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border placeholder-gray-400" placeholder="과거 지표 PDF 내용을 참고하여 자세히 적어주세요."></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">연간 목표 수치</label>
                <input type="number" step="0.1" name="target_value" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
            </div>
            
            <div class="flex justify-end pt-4">
                <a href="{% url 'dashboard' %}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 mr-3">취소</a>
                <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
                    <i class="fas fa-magic mr-2"></i> AI 추천받고 저장
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
