{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <div class="text-center mb-8">
            <i class="fas fa-lock text-3xl text-indigo-600 mb-3"></i>
            <h2 class="text-2xl font-bold text-gray-900">로그인</h2>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">이메일 (@ccon.kr)</label>
                <input type="text" name="username" id="username" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">비밀번호</label>
                <input type="password" name="password" id="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
            </div>
            
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                로그인
            </button>
        </form>
        
        <p class="mt-4 text-center text-sm text-gray-600">
            계정이 없으신가요? <a href="{% url 'signup' %}" class="font-medium text-indigo-600 hover:text-indigo-500">회원가입</a>
        </p>
    </div>
</div>
{% endblock %}
